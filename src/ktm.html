<body class="initialState view-mode">
<div id="toolbar-toggle" title="メニュー"><span id="toolbar-toggle-icon">☰</span></div>
<nav id="toolbar">
	<div id="toolbar-left">
		<button id="btn-settings" title="設定"><span class="btn-icon">⚙</span><span class="btn-text">設定</span></button>
	</div>
	<div id="toolbar-center">
		<span id="message-area"></span>
	</div>
	<div id="toolbar-right">

		<button id="btn-toggle-attach" title="添付ファイル表示切替 (Alt+↑)"><span class="btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3a2.5 2.5 0 0 1 5 0v9a1.5 1.5 0 0 1-3 0V5a.5.5 0 0 1 1 0v7a.5.5 0 0 0 1 0V3a1.5 1.5 0 1 0-3 0v9a2.5 2.5 0 0 0 5 0V5a.5.5 0 0 1 1 0v7a3.5 3.5 0 1 1-7 0z"></path></svg></span><span class="btn-text">画像を添付</span></button>
		<button id="btn-dark-mode" title="ダークモード切替"><span class="btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"></path></svg></span><span class="btn-text">ダーク</span></button>
		<button id="btn-toggle-mode" title="編集/閲覧切替 (ESC)"><span class="btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"></path></svg></span><span class="btn-text">編集</span></button>
		<button id="btn-export" title="編集不可のHTMLを書き出します (Ctrl+Shift+S)"><span class="btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"></path><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V9.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"></path></svg></span><span class="btn-text">書き出し</span></button>
		<button id="btn-save" title="保存 (Ctrl+S)"><span class="btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"></path><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"></path></svg></span><span class="btn-text">保存</span></button>
	</div>
</nav>
<div id="attach">
	<form id="attachForm"><input type="file" id="attachButton" multiple=""></form>
	<div id="filer">
		<ul id="fileList">
		</ul>
		<div id="paste-area" contenteditable="true">ここをクリックしてCtrl+Vでクリップボードの画像を添付できます</div>
	</div>
	<button id="attachToggleButton">添付ファイルを表示(Alt+↓)</button><button id="previewToggleButton">プレビューを隠す(Alt+→)</button>
</div>
<div id="wrapper">
	<div id="editorTabWrapper">
		<noscript>このファイルはJavaScriptを有効にするとより正確に表示できます。</noscript>
		<div id="editorTabContents">
			<textarea id="editor"></textarea>
			<textarea id="cssEditor"><inline src="css/previewer.css" />
<inline src="css/hljs.css" /></textarea>
		</div>
		<ol id="editorTabs">
			<li class="selected"><a href="#" id="markdownTab">Markdown</a></li>
			<li><a href="#" id="cssTab">CSS</a></li>
		</ol>
	</div>
	<div id="resize-handle" style="display: none;"></div>
	<div id="previewer" class="full-width" tabindex="-1"></div>
	<aside id="toc" aria-label="目次">
		<div class="toc-header">
			<span class="toc-title">目次</span>
		</div>
		<nav class="toc-body">
			<!-- 目次内容が動的に生成されます -->
		</nav>
	</aside>
</div>
<div id="settings-panel" hidden="">
	<h3>設定</h3>
	<label><input type="checkbox" id="setting-auto-sync" checked="checked"> 自動プレビュー</label>
	<label><input type="checkbox" id="setting-expand-tab"> タブキーでスペースを挿入</label>
	<label><input type="checkbox" id="setting-auto-close-tag"> 閉じタグを自動挿入</label>
	<label><input type="checkbox" id="setting-insert-img-tag"> 画像添付時にタグを挿入</label>
	<label><input type="checkbox" id="setting-require-trailing-spaces"> 改行に末尾スペース2個を必須にする</label>
	
	<hr style="border-top:1px solid var(--border); margin: 10px 0;">
	<p style="font-weight: bold; margin-bottom: 5px;">メニュー</p>
	<a href="https://hiro-gj.github.io/KanTanMarkdown/ktm-new.html" target="_blank" style="display:block; margin: 5px 0; color: var(--accent); text-decoration: none;">新規作成</a>
	<a href="http://tatesuke.github.io/KanTanMarkdown/syntax.html" id="helpButton" target="_blank" style="display:block; margin: 5px 0; color: var(--accent); text-decoration: none;">Markdown記法ヘルプ(F1)</a>
	<a href="#" id="updateButton" style="display:block; margin: 5px 0; color: var(--accent); text-decoration: none;">最新版にアップデート</a>
	<a href="http://tatesuke.github.io/KanTanMarkdown/" target="_blank" style="display:block; margin: 5px 0; color: var(--text-muted); text-decoration: none; font-size: 11px;">かんたんMarkdown <span class="version"></span></a>
	
	<button id="btn-settings-close" style="margin-top:10px; width:100%; border:1px solid var(--border); border-radius: var(--radius); padding:4px; cursor:pointer; background: var(--bg-surface); color: var(--text);">閉じる</button>
</div>
<div id="importDialog">
	<p id="importDialogMessage"></p>
	<form>
	<ul>
		<li><input type="checkBox" checked="checked" id="importDialogAttach"><label for="importDialogAttach">添付ファイル(末尾に挿入)</label></li>
		<li><input type="checkBox" checked="checked" id="importDialogMarkdown"><label for="importDialogMarkdown">Markdown(末尾に挿入)</label></li>
		<li><input type="checkBox" id="importDialogCss"><label for="importDialogCss">CSS(上書き)</label></li>
	</ul>
	<ul class="buttonArea">
		<li><button id="importDialogOkButton">OK</button></li>
		<li><button id="importDialogCancelButton">キャンセル</button></li>
	</ul>
	</form>
</div>
<div id="drawArea">
	<inline src="kantanDrawer.html" />
</div>
<input type="hidden" id="kantanVersion" value="<inline src="kantanVersion.txt" />">
<input type="hidden" id="kantanEdition" value="__KANTAN_EDITION__">
<div id="updateScriptArea"></div>
<script id="markedJs">
<inline src="js/marked.min.js" />
</script>

</script>

</script>
<script id="flowchartJs">

</script>
<script id="kantanEditorJS">
<inline src="js/kantanEditor.js" />
</script>
<script id="kantanDrawerJS">
<inline src="js/kantanDrawer.js" />
</script>
<script id="githubAlertsJs">
<inline src="js/github-alerts.js" />
</script>
<script id="kantanMarkdownJs">
<inline src="js/kantanMarkdown.js" />
</script>
