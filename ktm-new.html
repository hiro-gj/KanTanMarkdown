<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">
<title>かんたんMarkdown新規作成</title>
<style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f6f8fa;
  --bg-surface: #ffffff;
  --bg-editor: #f7f8f9;
  --bg-preview: #ffffff;
  --bg-toolbar: #ffffff;
  --border: #d1d9e0;
  --text: #1f2328;
  --text-muted: #59636e;
  --accent: #0969da;
  --accent-hover: #0550ae;
  --danger: #cf222e;
  --radius: 6px;
  --toolbar-height: 40px;
  --inline-code-bg: #818b981f;
  --shadow-button: 0 1px 1px 0 #1f23280a, 0 1px 2px 0 #1f232808;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Roboto, sans-serif;
  --font-mono: "Cascadia Code", "JetBrains Mono", "Noto Sans Mono", Consolas, monospace;
}

body.dark {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-editor: #11161c;
  --bg-preview: #1c2128;
  --bg-toolbar: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
}

body {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  overflow-x: hidden;
  overflow-y: scroll;
  display: flex;
  flex-direction: column;
}

body.view-mode {
  overflow-y: auto;
}

body.drag-over {
  outline: 3px dashed var(--accent);
  outline-offset: -3px;
}

/* ---- Toolbar (fixed header) ---- */
/* position: fixed にすることでスクロール中にツールバーが引っ込まないようにする。
   sticky だと body の flex column + overflow の組み合わせで
   一部環境で sticky が効かずスクロールすると引っ込む問題があったため。 */
#toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  padding-right: 48px;
  background: var(--bg-toolbar);
  border-bottom: none;
  gap: 8px;
  flex-shrink: 0;
  max-height: 0;
  min-height: 0;
  overflow: hidden;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  transition: max-height 0.25s ease;
}

#toolbar.visible {
  max-height: 60px;
  min-height: var(--toolbar-height);
  padding: 4px 12px;
  padding-right: 48px;
  border-bottom: 1px solid var(--border);
}

/* ---- Toolbar toggle (hamburger) ---- */
#toolbar-toggle {
  position: fixed;
  top: 4px;
  right: 8px;
  z-index: 200;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--text);
  box-shadow: var(--shadow-button);
  transition: background 0.2s;
}

#toolbar-toggle:hover {
  background: var(--bg);
}

#toolbar-left,
#toolbar-center,
#toolbar-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

#toolbar button {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-surface);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: nowrap;
}

.btn-icon {
  display: inline-flex;
  align-items: center;
  color: var(--text-muted);
}

body.dark .btn-icon {
  color: var(--text);
}

#toolbar button:hover {
  background: var(--bg);
  border-color: var(--accent);
}

#message-area {
  font-size: 12px;
  color: var(--text-muted);
}

/* ---- Attach section (collapsible header) ---- */
#attach-section {
  padding: 8px 12px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#attach-section #file-input {
  margin-bottom: 6px;
}

#file-list {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}

#file-list li {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-size: 12px;
}

#file-list .btn-file-remove,
#file-list .btn-file-download,
#file-list .btn-file-insert {
  border: none;
  background: none;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
}

#paste-area {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 8px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: text;
  background: var(--bg);
}

/* ---- Main wrapper (fills remaining height) ---- */
#wrapper {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

body.view-mode #wrapper {
  overflow: visible;
  flex: none;
  min-height: auto;
}

/* ---- Editor panel ---- */
#editor-tab-wrapper {
  width: var(--editor-width, 50%);
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  flex-shrink: 0;
  min-height: 0;
  min-width: 240px;
}

#editor,
#css-editor {
  flex: 1;
  width: 100%;
  min-height: 0;
  border: none;
  outline: none;
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
  tab-size: 4;
  resize: none;
  overflow-y: auto;
  background: var(--bg-editor);
  color: var(--text);
  box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.13);
}

body.dark #editor,
body.dark #css-editor {
  box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.5);
}

#css-editor {
  display: none;
}

/* Editor tabs (fixed footer inside editor panel) */
#editor-tabs {
  display: flex;
  list-style: none;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#editor-tabs li {
  flex: 1;
  text-align: center;
  padding: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
  border-bottom: 2px solid transparent;
}

#editor-tabs li:last-child {
  border-right: none;
}

#editor-tabs li.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* ---- Resize handle (between editor and previewer) ---- */
#resize-handle {
  width: 5px;
  flex-shrink: 0;
  cursor: col-resize;
  background: var(--border);
  transition: background 0.15s;
  position: relative;
  z-index: 10;
}

#resize-handle:hover,
#resize-handle.active {
  background: var(--accent);
}

/* ---- Previewer (scrollable content) ---- */
#previewer {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  background: var(--bg-preview);
  min-width: 240px;
}

#previewer.full-width {
  width: 100%;
  max-width: 980px;
  margin: 32px auto;
  overflow-y: visible;
  flex: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: var(--shadow-button);
}

body.dark #previewer.full-width {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
}

/* ---- TOC (table of contents, view mode only) - card style ---- */
#toc {
  position: sticky;
  top: 32px;
  width: 300px;
  max-height: calc(100vh - 80px);
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: var(--shadow-button);
  font-size: 13px;
  line-height: 1.5;
  display: none;
  flex-direction: column;
  flex: 0 0 300px;
  align-self: flex-start;
}

body.dark #toc {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
}

body.toc-visible.view-mode #toc {
  display: flex;
}

/* 目次表示時: プレビューアと目次を隣接する1ユニットとして中央寄せ。
   ヘッダーは全幅のまま（bodyのpaddingはいじらない）。
   wrapperをflex rowで中央寄せ、16pxのgapで2カードを隣接させる。
   align-items: flex-start で上端を揃え + 目次がstretchされないようにする(sticky動作のため) */
body.toc-visible.view-mode #wrapper {
  justify-content: center;
  align-items: flex-start;
  gap: 16px;
  padding: 32px 24px 32px 72px;
}

body.toc-visible.view-mode #previewer.full-width {
  margin: 0;
  width: auto;
  flex: 1 1 980px;
  max-width: 980px;
  min-width: 0;
}

#toc .toc-header {
  flex-shrink: 0;
}

#toc .toc-body {
  flex: 1;
  overflow-y: auto;
}

#toc .toc-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  padding: 0 6px 8px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
  display: block;
}

#toc .toc-empty {
  color: var(--text-muted);
  padding: 8px 6px;
  font-size: 12px;
}

#toc .toc-link {
  display: block;
  position: relative;
  padding: 4px 6px 4px 14px;
  color: var(--text-muted);
  text-decoration: none;
  cursor: pointer;
  border-radius: 4px;
  transition:
    color 0.15s,
    background 0.15s;
  word-break: break-word;
}

/* アクティブ表示用のアクセントバー（両端丸いカプセル型） */
#toc .toc-link::before {
  content: "";
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 75%;
  border-radius: 999px;
  background: transparent;
  transition: background 0.15s;
}

#toc .toc-link:hover {
  color: var(--text);
  background: var(--bg);
}

/* 現在見ている見出し: グレー → 黒 */
#toc .toc-link.active {
  color: var(--text);
  font-weight: 600;
}

#toc .toc-link.active::before {
  background: var(--accent);
}

/* 現在位置がH3/H4のとき、所属するH2も強調 */
#toc .toc-link.active-section {
  color: var(--text);
  font-weight: 600;
}

#toc .toc-h1,
#toc .toc-h2 {
  font-weight: 700;
}

/* アクティブ状態のトグルボタン */
#toolbar button.active-toggle {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

#toolbar button.active-toggle .btn-icon {
  color: #fff;
}

/* ---- Settings Panel ---- */
#settings-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  padding: 20px;
  z-index: 100;
  min-width: 280px;
}

#settings-panel h3 {
  font-size: 16px;
  margin-bottom: 12px;
}

#settings-panel label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  cursor: pointer;
  font-size: 13px;
}

#settings-panel button {
  margin-top: 12px;
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-surface);
  color: var(--text);
  cursor: pointer;
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
  #wrapper {
    flex-direction: column;
  }
  #editor-tab-wrapper {
    width: 100% !important;
    height: 50%;
    border-bottom: 1px solid var(--border);
  }
  #resize-handle {
    display: none;
  }
  #previewer {
    width: 100%;
    height: 50%;
    padding: 16px 20px;
  }
  #toolbar {
    flex-wrap: wrap;
    position: static;
  }
  #toolbar.visible {
    max-height: 300px;
    overflow-y: auto;
  }
  /* モバイルではツールバーボタンを折り返して全表示できるようにする */
  #toolbar-right {
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  #toolbar button {
    font-size: 12px;
    padding: 3px 6px;
  }
  /* モバイルではツールバーは in-flow のため、:has() による margin-top を打ち消す */
  body:has(#toolbar.visible) > #attach-section,
  body:has(#toolbar.visible) > #wrapper {
    margin-top: 0;
  }
  /* 閲覧モード：body を block に切り替えて自然にスクロールさせる */
  body.view-mode {
    display: block;
    height: auto;
    min-height: 100vh;
    overflow-y: visible;
  }
  /* 閲覧モードではプレビューアの高さを auto にして白背景を末尾まで伸ばす */
  body.view-mode #previewer {
    height: auto;
  }
  /* モバイルの目次：非表示デフォルト、表示時はプレビューアの上に配置 */
  #toc {
    display: none;
  }
  body.toc-visible.view-mode #toc {
    display: flex !important;
    position: static;
    order: -1;
    top: auto;
    width: 100%;
    max-height: 40vh;
    flex: 0 0 auto;
    margin-bottom: 16px;
  }
  body.toc-visible.view-mode #wrapper {
    justify-content: flex-start;
    align-items: stretch;
    gap: 0;
    padding: 0;
  }
  body.toc-visible.view-mode #previewer.full-width {
    margin: 16px auto;
    flex: none;
    width: 100%;
  }
}

/* ツールバー固定表示中は本体を下へずらして重なりを防ぐ */
body:has(#toolbar.visible) > #attach-section,
body:has(#toolbar.visible) > #wrapper {
  margin-top: var(--toolbar-height);
}

/* ツールバー表示中は目次のsticky位置を下げてツールバーとの間に余白を確保 */
body:has(#toolbar.visible) #toc {
  top: calc(var(--toolbar-height) + 32px);
}

/* GitHub Flavored Markdown - Preview Styles */

#previewer h1,
#previewer h2,
#previewer h3,
#previewer h4,
#previewer h5,
#previewer h6 {
  margin-top: 24px;
  margin-bottom: 16px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
  scroll-margin-top: 16px;
}

#previewer h1 {
  font-size: 2em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}
#previewer h2 {
  font-size: 1.5em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}
#previewer h3 {
  font-size: 1.25em;
}
#previewer h4 {
  font-size: 1em;
}
#previewer h5 {
  font-size: 0.875em;
}
#previewer h6 {
  font-size: 0.85em;
  color: var(--text-muted);
}

#previewer h1:first-child,
#previewer h2:first-child,
#previewer h3:first-child {
  margin-top: 0;
}

#previewer p {
  margin-top: 0;
  margin-bottom: 16px;
}

#previewer a {
  color: var(--accent);
  text-decoration: none;
}
#previewer a:hover {
  text-decoration: underline;
}

#previewer strong {
  font-weight: 600;
}
#previewer em {
  font-style: italic;
}

#previewer del {
  text-decoration: line-through;
  color: var(--text-muted);
}

#previewer hr {
  height: 0.25em;
  padding: 0;
  margin: 24px 0;
  background-color: var(--border);
  border: 0;
}

#previewer blockquote {
  padding: 0 1em;
  color: var(--text-muted);
  border-left: 0.25em solid var(--border);
  margin: 0 0 16px 0;
}

#previewer blockquote > :first-child {
  margin-top: 0;
}
#previewer blockquote > :last-child {
  margin-bottom: 0;
}

#previewer ul,
#previewer ol {
  margin-top: 0;
  margin-bottom: 16px;
  padding-left: 2em;
}

#previewer ul ul,
#previewer ul ol,
#previewer ol ul,
#previewer ol ol {
  margin-top: 0;
  margin-bottom: 0;
}

#previewer li {
  margin-bottom: 0.25em;
}
#previewer li > p {
  margin-bottom: 0;
}

#previewer ul li::marker {
  color: var(--text-muted);
}

/* Task list */
#previewer input[type="checkbox"] {
  margin-right: 0.5em;
  accent-color: var(--accent);
}

#previewer img {
  max-width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 4px;
}

/* Inline code */
#previewer code:not(pre code) {
  padding: 0.2em 0.4em;
  margin: 0;
  font-size: 85%;
  background-color: var(--inline-code-bg);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  color: #cf222e;
}

/* Code block with filename */
#previewer .code-block {
  margin-bottom: 16px;
}

#previewer .code-filename {
  display: inline-block;
  padding: 4px 12px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Code blocks */
#previewer pre {
  padding: 16px;
  overflow: auto;
  font-size: 85%;
  line-height: 1.45;
  background-color: var(--bg);
  border-radius: var(--radius);
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

#previewer .code-block pre {
  margin-top: 0;
  border-top-left-radius: 0;
}

#previewer pre code {
  background: none;
  padding: 0;
  font-size: inherit;
}

/* Tables */
#previewer table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 16px;
  display: block;
  overflow: auto;
}

#previewer table th,
#previewer table td {
  padding: 6px 13px;
  border: 1px solid var(--border);
}

#previewer table th {
  font-weight: 600;
  background: var(--bg);
}

#previewer table tr:nth-child(2n) {
  background: var(--bg);
}

#previewer table tr {
  background: var(--bg-surface);
}

/* Mermaid diagrams */
#previewer .mermaid-block {
  margin: 16px 0;
  text-align: center;
  overflow-x: auto;
  font-size: 12px;
  color: var(--text-muted);
}

#previewer .mermaid-block.mermaid-rendered {
  color: inherit;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
}

#previewer .mermaid-block.mermaid-error {
  color: var(--danger);
  font-family: var(--font-mono);
  background: var(--bg);
  padding: 12px;
  border-radius: var(--radius);
  text-align: left;
  white-space: pre-wrap;
}

/* Keyboard kbd tag */
#previewer kbd {
  display: inline-block;
  padding: 3px 6px;
  font-family: var(--font-mono);
  font-size: 85%;
  background-color: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  box-shadow: inset 0 -1px 0 var(--border);
}

/* KaTeX */
#previewer .katex-error {
  color: var(--danger);
  font-family: var(--font-mono);
  font-size: 12px;
}

#previewer .katex-display {
  margin: 16px 0;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
}

/* Print */
@media print {
  #toolbar,
  #editor-tab-wrapper,
  #attach-section,
  #settings-panel,
  #toc {
    display: none !important;
  }
  #previewer {
    width: 100% !important;
    padding: 0 !important;
  }
}

/* ---- Dark mode: syntax highlighting ---- */
body.dark .hljs {
  color: #c9d1d9;
  background: #0d1117;
}
body.dark .hljs-doctag,
body.dark .hljs-keyword,
body.dark .hljs-meta .hljs-keyword,
body.dark .hljs-template-tag,
body.dark .hljs-template-variable,
body.dark .hljs-type,
body.dark .hljs-variable.language_ {
  color: #ff7b72;
}
body.dark .hljs-title,
body.dark .hljs-title.class_,
body.dark .hljs-title.class_.inherited__,
body.dark .hljs-title.function_ {
  color: #d2a8ff;
}
body.dark .hljs-attr,
body.dark .hljs-attribute,
body.dark .hljs-literal,
body.dark .hljs-meta,
body.dark .hljs-number,
body.dark .hljs-operator,
body.dark .hljs-variable,
body.dark .hljs-selector-attr,
body.dark .hljs-selector-class,
body.dark .hljs-selector-id {
  color: #79c0ff;
}
body.dark .hljs-regexp,
body.dark .hljs-string,
body.dark .hljs-meta .hljs-string {
  color: #a5d6ff;
}
body.dark .hljs-built_in,
body.dark .hljs-symbol {
  color: #ffa657;
}
body.dark .hljs-comment,
body.dark .hljs-code,
body.dark .hljs-formula {
  color: #8b949e;
}
body.dark .hljs-name,
body.dark .hljs-quote,
body.dark .hljs-selector-tag,
body.dark .hljs-selector-pseudo {
  color: #7ee787;
}
body.dark .hljs-subst {
  color: #c9d1d9;
}
body.dark .hljs-section {
  color: #1f6feb;
  font-weight: bold;
}
